name: CI

# Keeps `main` always green. Runs on every push and PR to main.
# Hard gates (fail the build): typecheck · build · tests.
# Non-blocking (reported, doesn't fail yet): lint + bundle budget — there is
# pre-existing lint debt (mostly `no-explicit-any` in src/integrations/cog/*,
# owned by Lovable). Flip `continue-on-error: false` once that debt is cleared.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Cancel superseded runs on the same ref to save minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: typecheck · build · test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # ── Hard gates ──────────────────────────────────────────────
      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      # ── Non-blocking (debt being paid down by owners) ───────────
      - name: Lint (non-blocking)
        continue-on-error: true
        run: npm run lint

      - name: Bundle budget (non-blocking)
        continue-on-error: true
        run: npm run perf:budget

      - name: Upload QA gate report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qa-gate-report
          path: docs/codex-qa-gate/latest.json
          if-no-files-found: ignore
